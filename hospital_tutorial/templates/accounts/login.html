{% extends 'auth_base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header text-center bg-primary text-white">
                <h3>Hospital Login</h3>
            </div>

            <div class="card-body">

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Username"
                            required>
                    </div>

                    <div class="mb-3">
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Password"
                            required>
                    </div>

                    <button class="btn btn-success w-100">
                        Login
                    </button>

                </form>

                <hr>

                <a href="{% url 'doctor_register' %}" class="btn btn-primary w-100 mb-2">
                    Register as Doctor
                </a>

                <a href="{% url 'patient_register' %}" class="btn btn-secondary w-100">
                    Register as Patient
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
