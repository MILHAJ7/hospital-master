{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/book_appointment.css' %}">
{% endblock %}

{% block content %}

<div class="appointment-container">

    <h2>Book Appointment</h2>

    <form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn-book">
        Book Appointment
    </button>

</form>

</div>

{% endblock %}
